---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - operator.openshift.io
  resources:
  - spireconfigs
  - zerotrustworkloadidentitymanagers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - operator.openshift.io
  resources:
  - spireconfigs/finalizers
  - zerotrustworkloadidentitymanagers/finalizers
  verbs:
  - update
- apiGroups:
  - operator.openshift.io
  resources:
  - spireconfigs/status
  - zerotrustworkloadidentitymanagers/status
  verbs:
  - get
  - patch
  - update
